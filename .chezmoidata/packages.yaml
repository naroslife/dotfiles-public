# Tool inventory by tier and install method
# Used by bootstrap.sh and mise configuration
# Referenced in chezmoi templates for conditional installation

# Tier 1: Standalone binaries — alias/PATH swap, installed via mise
tier1_mise_aqua:
  # Modern CLI replacements
  - bat          # cat replacement
  - eza          # ls replacement
  - fd           # find replacement
  - ripgrep      # grep replacement (binary: rg)
  - zoxide       # cd replacement (binary: z)
  - duf          # df replacement
  - dust         # du replacement
  - procs        # ps replacement
  - bottom       # top/htop replacement (binary: btm)
  - xh           # http/httpie replacement
  - gping        # ping replacement
  - dog          # dig replacement
  - bandwhich    # network bandwidth monitor
  # Data tools
  - jq
  - yq
  - fx
  - miller       # binary: mlr
  - sad          # stream editor
  # Git tools
  - lazygit
  - delta        # git diff pager
  - difftastic   # structural diff (binary: difft)
  - gitui
  - gh           # GitHub CLI
  - gitleaks     # secret scanner
  # Container/K8s tools
  - lazydocker
  - k9s
  - kubectx
  # Code analysis
  - tokei
  - scc
  - sccache
  # Productivity
  - tealdeer     # binary: tldr
  - cheat
  - navi
  - broot
  - termscp
  - restic
  - usql
  # Dev tools
  - choose

tier1_mise_native:  # mise built-in backends (no ubi/aqua prefix needed)
  - kubectl      # mise native backend
  - helm         # mise native backend

tier1_mise_pipx:
  - httpie       # binary: http/https
  - visidata     # binary: vd
  - ranger
  - git-filter-repo
  - pre-commit

tier1_mise_cargo:
  - rustscan
  - git-absorb

tier1_apt:
  - pv
  - most
  - stow
  - git-crypt
  - cloc
  - cppcheck
  - mosh
  - autossh
  - sshfs
  - ssh-copy-id    # part of openssh-client
  - hexdump        # part of bsdmainutils
  - xxd            # standalone package

# Tier 2: Binaries with config/data files — managed by chezmoi + mise
tier2:
  starship:
    install: mise_aqua
    config: dot_config/starship.toml
  atuin:
    install: mise_aqua
    config: dot_config/atuin/config.toml
  fzf:
    install: mise_aqua
    config: env_vars_in_rc
  tmux:
    install: apt  # no precompiled binaries — source-only releases
    config: dot_config/tmux/tmux.conf
    plugin_manager: tpm
  neovim:
    install: mise_aqua
    config: dot_config/nvim/
    plugin_manager: lazy.nvim
  helix:
    install: mise_aqua
    config: dot_config/helix/config.toml
  carapace:
    install: mise_aqua
    config: dot_config/carapace/
  direnv:
    install: mise_aqua
    config: dot_direnvrc
  git:
    install: apt
    config: dot_gitconfig.tmpl  # template — varies per user
  zsh:
    install: apt
    config: dot_zshrc.tmpl      # template — varies per machine
  sampler:
    install: mise_aqua
    config: dot_config/sampler/config.yaml  # optional — config template not yet added
    optional: true
  rclone:
    install: mise_aqua
    config: dot_config/rclone/rclone.conf   # optional — age-encrypted config template not yet added
    optional: true

# Tier 3: Complex toolchains — apt preferred, mise for JVM/Go/Node/Rust
tier3_apt:
  - gdb               # install: apt; verify: gdb -ex "python print('ok')" -ex quit
  - gcc               # install: apt; verify: echo 'int main(){}' | gcc -x c - -o /dev/null
  - g++
  - build-essential
  - clang-format      # install: apt; verify: echo '{}' | clang-format
  - clang-tidy
  - valgrind          # install: apt; verify: valgrind /tmp/trivial-binary
  - lldb
  - autoconf
  - automake
  - libtool
  - strace
  - ltrace
  - cmake             # install: apt; verify: cmake --help-module FindThreads
  - ninja-build
  - pkg-config
  - linux-tools-generic   # perf — actual pkg: linux-tools-$(uname -r); WSL2: not supported

tier3_apt_optional:
  - rr    # Record & Replay debugger; apt if available; WSL2: not supported (no perf_event)

tier3_mise_full_prefix:  # mise manages full toolchain prefix with JAVA_HOME/GOROOT/etc.
  - java@temurin-17   # env: JAVA_HOME (auto via mise activate)
  - maven             # env: MAVEN_OPTS=-Xmx1024m
  - gradle
  - go                # env: GOPATH=~/go, GOBIN=~/go/bin
  - node              # env: NPM_CONFIG_PREFIX=~/.npm-global
  - rust              # env: CARGO_HOME=~/.cargo, RUSTUP_HOME=~/.rustup
  - python            # verify: python3 -m venv /tmp/test-venv

tier3_mise_aqua:
  - bazel

tier3_mise_pipx:
  - meson

# Tier 4: Container/platform-managed — documented prerequisites
tier4_prereqs:
  - docker           # apt/snap system daemon
  - docker-compose   # docker-compose-plugin
  - wireshark        # apt — GUI + kernel module
  - nmap             # apt — raw sockets
  - cuda-toolkit     # NVIDIA repo — driver + kernel
  - wslu             # apt — WSL utilities (wsl-only)
  - nerd-fonts       # manual download or fc-cache script

# Tools dropped (Nix-specific or replaced)
dropped:
  - nix-tree
  - nix-diff
  - nixpkgs-fmt
  - nil              # Nix LSP
  - nix-output-monitor
  - alejandra        # Nix formatter
  - nix-prefetch-git
  - sops             # replaced by chezmoi age encryption
  - ssh-to-age       # replaced by chezmoi age encryption
  - elvish           # dropped per requirements
