# atuin configuration
# Managed by chezmoi — edit source at home/dot_config/atuin/config.toml

# ── Sync ──────────────────────────────────────────────────────────────────────
auto_sync      = false      # Disable auto-sync for faster startup
update_check   = false
sync_frequency = "1h"
sync_address   = "https://api.atuin.sh"

# Key paths (set per-machine — do not put actual keys here)
key_path     = "~/.local/share/atuin/key"
session_path = "~/.local/share/atuin/session"

# ── Search UI ─────────────────────────────────────────────────────────────────
search_mode                  = "fuzzy"
filter_mode                  = "global"
filter_mode_shell_up_key_binding = "global"
style                        = "compact"
inline_height                = 10
show_preview                 = true
max_preview_height           = 4
show_help                    = true
exit_mode                    = "return-original"
enter_accept                 = false

# ── Stats ─────────────────────────────────────────────────────────────────────
common_prefix      = ["sudo"]
common_subcommands = ["docker", "git", "npm", "cargo", "mise"]

# ── History filter ────────────────────────────────────────────────────────────
history_filter = []
