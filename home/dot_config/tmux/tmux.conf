# ~/.config/tmux/tmux.conf — managed by chezmoi
# Edit source at home/dot_config/tmux/tmux.conf

# ── Prefix ────────────────────────────────────────────────────────────────────
set -g prefix C-b
bind C-b send-prefix

# ── General settings ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 100000
set -g escape-time 0
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g status-interval 1

# ── Key bindings ──────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Splitting panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix - resize-pane -D 7
bind -r -T prefix = resize-pane -U 7

# Window navigation
bind H previous-window
bind L next-window
bind ^A last-window
bind ^W list-windows
bind w list-windows
bind z resize-pane -Z
bind S choose-session
bind '"' choose-window

# Session management
bind ^C new-window -c "$HOME"
bind ^D detach

# Copy mode (vi)
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi r send -X rectangle-toggle

# Kill
bind c kill-pane
bind x swap-pane -D

# Misc
bind * list-clients
bind * setw synchronize-panes
bind P set pane-border-status
bind K send-keys "clear"\; send-keys "Enter"
bind ^L refresh-client
bind : command-prompt

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e2030 fg=#82aaff"
set -g status-left-length 30
set -g status-left "#[bg=#3b4261,fg=#82aaff,bold] #S #[bg=#1e2030] "
set -g status-right-length 60
set -g status-right "#[bg=#3b4261,fg=#82aaff] %Y-%m-%d %H:%M "

# Window status
setw -g window-status-format "#[bg=#1e2030,fg=#828bb8] #I:#W "
setw -g window-status-current-format "#[bg=#82aaff,fg=#1e2030,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#82aaff"

# Messages
set -g message-style "bg=#82aaff,fg=#1e2030,bold"

# ── Plugins (tpm) ─────────────────────────────────────────────────────────────
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

set -g @continuum-restore "on"
set -g @resurrect-capture-pane-contents "on"

# Initialize tpm (keep at bottom)
run "~/.tmux/plugins/tpm/tpm"
